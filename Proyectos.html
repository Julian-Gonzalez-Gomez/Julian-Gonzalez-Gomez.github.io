<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Proyectos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
    </button>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <button class="close-sidebar" id="closeSidebar" aria-label="Cerrar menú">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html">Portofolio</a></li>
                    <li><a href="Proyectos.html" class="active">Proyectos</a></li>
                    <li><a href="./Proyectos/Circuitos/Circuitos.html">Circuitos de Poder</a></li>
                    <li><a href="IA.html">Inteligencia Artificial</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1  class="project-title">PROYECTO PRINCIPAL</h1>
            </header>
            
            <section class="project-description">
                <p>Bienvenido al visor cartográfico y de proyectos. Seleccioná una de las opciones de la barra lateral para alternar entre los diferentes análisis disponibles.</p>
            </section>

            <section class="map-container">
                <div id="map">
                    <span class="map-placeholder">[Mapa General]</span>
                </div>
            </section>
        </main>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const closeSidebar = document.getElementById('closeSidebar');
        const sidebar = document.getElementById('sidebar');

        // Abrir barra lateral
        menuToggle.addEventListener('click', () => {
            sidebar.classList.add('active');
        });

        // Cerrar barra lateral desde el botón interno
        closeSidebar.addEventListener('click', () => {
            sidebar.classList.remove('active');
        });
    </script>
</body>
</html>
