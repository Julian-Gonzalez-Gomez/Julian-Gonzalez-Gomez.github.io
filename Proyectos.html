<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Proyectos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
    </button>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#" class="active">Proyecto 1</a></li>
                    <li><a href="#">Proyecto 2</a></li>
                    <li><a href="#">Proyecto 3</a></li>
                    <li><a href="#">Proyecto 4</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1 class="project-title">TÍTULO DEL PROYECTO</h1>
            </header>
            
            <section class="project-description">
                <p>textotextotexto textotexto textotextotexto textotextotexto textotextotexto</p>
                <p>textotextotexto textotextotexto textotextotexto</p>
            </section>

            <section class="map-container">
                <div id="map">
                    <span class="map-placeholder">[mapa]</span>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Lógica simple y eficiente para el menú responsive
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // Opcional: Cerrar el menú al hacer click en un enlace (en móviles)
        sidebar.addEventListener('click', (e) => {
            if (e.target.tagName === 'A' && window.innerWidth <= 768) {
                sidebar.classList.remove('active');
            }
        });
    </script>
</body>
</html>
