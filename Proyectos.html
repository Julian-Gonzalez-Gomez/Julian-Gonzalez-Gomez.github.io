<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Proyectos con Markdown</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
    </button>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#" class="nav-link active" data-md="./proyecto1.md">Proyecto 1</a></li>
                    <li><a href="#" class="nav-link" data-md="proyectos/proyecto2.md">Proyecto 2</a></li>
                    <li><a href="#" class="nav-link" data-md="proyectos/proyecto3.md">Proyecto 3</a></li>
                    <li><a href="#" class="nav-link" data-md="proyectos/proyecto4.md">Proyecto 4</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <article class="markdown-body" id="content-area">
                <p>Cargando proyecto...</p>
            </article>

            <section class="map-container">
                <div id="map">
                    <span class="map-placeholder">[mapa]</span>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Lógica para el menú responsive
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // --- LÓGICA DE CARGA DE MARKDOWN ---
        const contentArea = document.getElementById('content-area');
        const navLinks = document.querySelectorAll('.nav-link');

        // Función asíncrona para buscar el archivo .md y renderizarlo
        async function loadMarkdown(url) {
            try {
                contentArea.innerHTML = "<p>Cargando contenido...</p>";
                const response = await fetch(url);
                
                if (!response.ok) throw new Error("No se pudo encontrar el archivo Markdown");
                
                const markdownText = await response.text();
                
                // marked.parse() transforma el string de Markdown en HTML limpio
                contentArea.innerHTML = marked.parse(markdownText);
            } catch (error) {
                contentArea.innerHTML = `<p style="color:red;">Error al cargar el proyecto: ${error.message}</p>`;
            }
        }

        // Evento de click para cambiar de proyecto
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                
                // Remueve estado activo anterior y lo asigna al nuevo
                navLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                // Obtiene la ruta del archivo .md desde el atributo data-md
                const mdUrl = link.getAttribute('data-md');
                if (mdUrl) loadMarkdown(mdUrl);

                // Cierra el menú en móviles tras clickear
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('active');
                }
            });
        });

        // Carga inicial del primer proyecto al abrir la página
        document.addEventListener('DOMContentLoaded', () => {
            const initialProject = document.querySelector('.nav-link.active').getAttribute('data-md');
            loadMarkdown(initialProject);
        });
    </script>
</body>
</html>
